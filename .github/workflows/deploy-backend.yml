# ─────────────────────────────────────────────────────────────────────────────
# Backend CI/CD
#
# Branch strategy:
#   main       → build image → deploy to Leapcell (dev / testing)
#   production → build image → deploy to Alibaba Cloud SAE (prod)
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME        Docker Hub username
#   DOCKERHUB_TOKEN           Docker Hub access token (not your password)
#   LEAPCELL_DEPLOY_HOOK_URL  Leapcell deploy webhook URL
#                             (Dashboard → Service → Settings → Deploy Hook)
#   ALIBABA_ACCESS_KEY_ID     Alibaba Cloud RAM access key ID
#   ALIBABA_ACCESS_KEY_SECRET Alibaba Cloud RAM access key secret
#   ALIBABA_REGION_ID         e.g. ap-southeast-5
#   SAE_APP_ID                SAE Application ID (UUID from SAE console)
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy Backend

on:
  push:
    branches:
      - main
      - production
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

env:
  IMAGE_NAME: ${{ github.repository_owner }}/paylabs-kyc-backend

jobs:
  # ── 1. Build & push Docker image to Docker Hub ───────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      short-sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set short SHA output
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2a. Deploy to Leapcell (Dev / Testing) — triggered by push to main ───
  deploy-leapcell:
    name: Deploy to Leapcell (Dev)
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Leapcell deploy hook
        # Leapcell will pull the latest image from your connected registry
        # and redeploy the service automatically.
        run: |
          curl --silent --show-error --fail-with-body \
            -X POST "${{ secrets.LEAPCELL_DEPLOY_HOOK_URL }}"

  # ── 2b. Deploy to Alibaba Cloud SAE (Production) — triggered by push to production branch ──
  deploy-sae:
    name: Deploy to Alibaba Cloud SAE (Prod)
    needs: build-and-push
    if: github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest

    steps:
      - name: Install Alibaba Cloud CLI
        run: |
          curl -sSL https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz | tar -xz
          sudo mv aliyun /usr/local/bin/

      - name: Configure Alibaba Cloud CLI
        run: |
          aliyun configure set \
            --access-key-id "${{ secrets.ALIBABA_ACCESS_KEY_ID }}" \
            --access-key-secret "${{ secrets.ALIBABA_ACCESS_KEY_SECRET }}" \
            --region "${{ secrets.ALIBABA_REGION_ID }}" \
            --mode AK

      - name: Deploy new image to SAE
        run: |
          aliyun sae DeployApplication \
            --AppId "${{ secrets.SAE_APP_ID }}" \
            --ImageUrl "docker.io/${{ env.IMAGE_NAME }}:sha-${{ needs.build-and-push.outputs.short-sha }}" \
            --region "${{ secrets.ALIBABA_REGION_ID }}"
